{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}账户充值{% endblock %}

{% block extra_css %}
<style>
    .recharge-container {
        max-width: 520px;
        margin: 0 auto;
    }

    .recharge-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        overflow: hidden;
    }

    .recharge-header {
        background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
        padding: 48px 40px 40px;
        text-align: center;
        border-bottom: 1px solid var(--border-color);
        position: relative;
    }

    .recharge-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--accent-gold), var(--accent-red));
    }

    .recharge-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, rgba(255, 214, 10, 0.15) 0%, rgba(255, 214, 10, 0.05) 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 2.5rem;
    }

    .recharge-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.5rem;
        margin-bottom: 8px;
    }

    .recharge-subtitle {
        color: var(--text-secondary);
        margin: 0;
    }

    .recharge-body {
        padding: 40px;
    }

    .quick-amounts {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 24px;
    }

    .quick-amount-btn {
        padding: 12px 16px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition-fast);
        text-align: center;
    }

    .quick-amount-btn:hover {
        border-color: var(--accent-gold);
        color: var(--accent-gold);
    }

    .quick-amount-btn.selected {
        background: var(--accent-gold);
        border-color: var(--accent-gold);
        color: var(--bg-primary);
    }

    .btn-recharge {
        width: 100%;
        padding: 16px 24px;
        font-size: 1.05rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="recharge-container animate-in">
    <div class="recharge-card">
        <div class="recharge-header">
            <div class="recharge-icon">💰</div>
            <h1 class="recharge-title">账户充值</h1>
            <p class="recharge-subtitle">为您的账户添加余额，参与更多活动</p>
        </div>
        <div class="recharge-body">
            <form method="post">
                {% csrf_token %}
                <div class="quick-amounts">
                    <button type="button" class="quick-amount-btn" data-amount="10">10€</button>
                    <button type="button" class="quick-amount-btn" data-amount="20">20€</button>
                    <button type="button" class="quick-amount-btn" data-amount="50">50€</button>
                    <button type="button" class="quick-amount-btn" data-amount="100">100€</button>
                </div>
                {{ form|crispy }}
                <div class="mt-3">
                    <button type="submit" class="btn btn-gold btn-recharge">充值</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.querySelectorAll('.quick-amount-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.quick-amount-btn').forEach(function(b) {
            b.classList.remove('selected');
        });
        this.classList.add('selected');
        document.getElementById('id_amount').value = this.dataset.amount;
    });
});
</script>
{% endblock %}
