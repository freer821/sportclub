{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}创建活动{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 640px;
        margin: 0 auto;
    }

    .form-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        overflow: hidden;
    }

    .form-header {
        background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
        padding: 48px 40px 40px;
        text-align: center;
        border-bottom: 1px solid var(--border-color);
        position: relative;
    }

    .form-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--accent-red), var(--accent-gold));
    }

    .form-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, rgba(230, 57, 70, 0.15) 0%, rgba(230, 57, 70, 0.05) 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 2.5rem;
    }

    .form-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.5rem;
        margin-bottom: 8px;
    }

    .form-subtitle {
        color: var(--text-secondary);
        margin: 0;
    }

    .form-body {
        padding: 40px;
    }

    .btn-submit {
        width: 100%;
        padding: 16px 24px;
        font-size: 1.05rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container animate-in">
    <div class="form-card">
        <div class="form-header">
            <div class="form-icon">📅</div>
            <h1 class="form-title">创建新活动</h1>
            <p class="form-subtitle">设置活动详细信息并发布</p>
        </div>
        <div class="form-body">
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary btn-submit">创建活动</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
