{% extends 'base.html' %}

{% block title %}登录{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 480px;
        margin: 0 auto;
        padding-top: 40px;
    }

    .auth-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        overflow: hidden;
    }

    .auth-header {
        background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
        padding: 48px 40px 40px;
        text-align: center;
        border-bottom: 1px solid var(--border-color);
        position: relative;
    }

    .auth-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--accent-red), var(--accent-gold));
    }

    .auth-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, rgba(230, 57, 70, 0.15) 0%, rgba(230, 57, 70, 0.05) 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 2.5rem;
    }

    .auth-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.5rem;
        margin-bottom: 8px;
    }

    .auth-subtitle {
        color: var(--text-secondary);
        margin: 0;
    }

    .auth-body {
        padding: 40px;
    }

    .auth-footer {
        text-align: center;
        padding: 24px 40px 32px;
        background: var(--bg-secondary);
        border-top: 1px solid var(--border-color);
    }

    .auth-footer a {
        color: var(--accent-gold);
        text-decoration: none;
        font-weight: 600;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    .btn-auth {
        width: 100%;
        padding: 16px 24px;
        font-size: 1.05rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container animate-in">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h1 class="auth-title">登录</h1>
            <p class="auth-subtitle">欢迎回到法兰克福华人篮球俱乐部</p>
        </div>
        <div class="auth-body">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username" class="form-label">用户名</label>
                    <input type="text" name="username" class="form-control" id="id_username" required placeholder="输入您的用户名">
                </div>
                <div class="form-group">
                    <label for="id_password" class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" id="id_password" required placeholder="输入您的密码">
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary btn-auth">登录</button>
                </div>
            </form>
        </div>
        <div class="auth-footer">
            <p>还没有账号？ <a href="{% url 'register' %}">立即注册</a></p>
        </div>
    </div>
</div>
{% endblock %}
